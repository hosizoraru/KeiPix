name: KeiPix
options:
  bundleIdPrefix: com.keipix
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  defaultConfig: Debug
  xcodeVersion: "26.3"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    # KeiPix targets Apple OS 26+ on Apple silicon-era SDKs; keep Xcode
    # products arm64-only instead of producing stale x86_64 slices.
    ARCHS: arm64
    EXCLUDED_ARCHS: x86_64
    CLANG_ENABLE_MODULES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    # Keep in sync with Config/AppVersion.xcconfig via script/set_app_version.sh.
    MARKETING_VERSION: "0.27.8"
    CURRENT_PROJECT_VERSION: "2708"
    KEIPIX_BUILD_NUMBER_SOURCE: config
    KEIPIX_BUILD_ANCHOR_TAG: ""
    KEIPIX_BUILD_COMMIT_COUNT: "0"
    KEIPIX_BUILD_BASE_NUMBER: "2708"
    KEIPIX_BUILD_DISPLAY_NUMBER: "2708"
    KEIPIX_BUILD_IDENTITY: "v0.27.8"
    KEIPIX_GIT_COMMIT: ""
    KEIPIX_GIT_SHORT_COMMIT: ""
    KEIPIX_GIT_DIRTY: "NO"
    KEIPIX_GIT_DESCRIBE: ""
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      ONLY_ACTIVE_ARCH: YES
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: wholemodule

targets:
  KeiPix:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/KeiPix
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keipix.client
        PRODUCT_NAME: KeiPix
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: keipixiv
        CODE_SIGN_ENTITLEMENTS: App/KeiPix.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_APP_SANDBOX: YES
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    scheme:
      testTargets:
        - KeiPixTests
      gatherCoverageData: false
      commandLineArguments: {}
      environmentVariables: []

  KeiPixiOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/KeiPix
        excludes:
          - "**/.DS_Store"
      - path: PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keipix.client.ios
        PRODUCT_NAME: KeiPix
        INFOPLIST_FILE: App/Info-iOS.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: keipixiv
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
    scheme:
      gatherCoverageData: false
      commandLineArguments: {}
      environmentVariables: []

  KeiPixiPad:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/KeiPix
        excludes:
          - "**/.DS_Store"
      - path: PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keipix.client.ipad
        PRODUCT_NAME: KeiPix
        INFOPLIST_FILE: App/Info-iPadOS.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: keipixiv
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTS_MACCATALYST: NO
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
    scheme:
      gatherCoverageData: false
      commandLineArguments: {}
      environmentVariables: []

  KeiPixTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/KeiPixTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: KeiPix
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keipix.client.tests
        PRODUCT_NAME: KeiPixTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/KeiPix.app/Contents/MacOS/KeiPix"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: minimal

schemes:
  KeiPix:
    build:
      targets:
        KeiPix: all
        KeiPixTests: [test]
    run:
      config: Debug
      executable: KeiPix
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - KeiPixTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  KeiPix iOS:
    build:
      targets:
        KeiPixiOS: all
    run:
      config: Debug
      executable: KeiPixiOS
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  KeiPix iPadOS:
    build:
      targets:
        KeiPixiPad: all
    run:
      config: Debug
      executable: KeiPixiPad
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
