name: Build, Test & Package

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      include_dmg:
        description: "Also build a macOS DMG for manual runs"
        type: boolean
        default: false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  KEIPIX_BUILD_NUMBER_STRATEGY: git

permissions:
  contents: write
  actions: read

jobs:
  test:
    name: Build & test macOS
    runs-on: macos-26
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Select Xcode toolchain
        run: |
          set -euo pipefail
          xcode_path=""
          while IFS= read -r candidate; do
            xcode_path="$candidate"
          done < <(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V)
          if [ -z "$xcode_path" ]; then
            xcode_path="/Applications/Xcode.app"
          fi
          echo "Using $xcode_path"
          sudo xcode-select -s "$xcode_path/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM debug build products
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: spm-debug-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.resolved', 'Package.swift', 'Sources/**/*.swift', 'Sources/KeiPix/Resources/**') }}
          restore-keys: |
            spm-debug-${{ runner.os }}-${{ runner.arch }}-

      - name: Resolve build parallelism
        id: parallelism
        run: |
          set -euo pipefail
          source ./script/build_parallelism.sh
          jobs="$(keipix_resolve_build_jobs "${KEIPIX_BUILD_JOBS:-}")"
          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"
          echo "Using $jobs Swift build jobs"

      - name: Resolve dependencies
        run: swift package resolve

      - name: Check version settings
        run: ./script/check_version_consistency.sh

      - name: Build (macOS arm64)
        run: swift build --arch arm64 --jobs "${{ steps.parallelism.outputs.jobs }}"

      - name: Run tests
        run: swift test --arch arm64 --parallel --jobs "${{ steps.parallelism.outputs.jobs }}"

  package-macos:
    name: Package macOS .app zip
    runs-on: macos-26
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Select Xcode toolchain
        run: |
          set -euo pipefail
          xcode_path=""
          while IFS= read -r candidate; do
            xcode_path="$candidate"
          done < <(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V)
          if [ -z "$xcode_path" ]; then
            xcode_path="/Applications/Xcode.app"
          fi
          echo "Using $xcode_path"
          sudo xcode-select -s "$xcode_path/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM release build products
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: spm-release-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.resolved', 'Package.swift', 'Sources/**/*.swift', 'Sources/KeiPix/Resources/**') }}
          restore-keys: |
            spm-release-${{ runner.os }}-${{ runner.arch }}-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Check version settings
        run: ./script/check_version_consistency.sh

      - name: Determine macOS package format
        id: macos-format
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          INCLUDE_DMG: ${{ github.event.inputs.include_dmg }}
        run: |
          set -euo pipefail
          if [ "${REF#refs/tags/v}" != "$REF" ] || { [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INCLUDE_DMG" = "true" ]; }; then
            fmt="both"
          else
            fmt="zip"
          fi
          echo "format=$fmt" >> "$GITHUB_OUTPUT"
          echo "macOS package format: $fmt"

      - name: Build release .app and package
        run: ./script/build_release_app.sh "${{ steps.macos-format.outputs.format }}"

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          source ./script/version_settings.sh
          keipix_load_version_settings "$PWD"
          echo "version=$KEIPIX_MARKETING_VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$KEIPIX_BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Version: $KEIPIX_MARKETING_VERSION ($KEIPIX_BUILD_NUMBER, source: $KEIPIX_BUILD_NUMBER_SOURCE, anchor: ${KEIPIX_BUILD_ANCHOR_TAG:-none}, commits: $KEIPIX_BUILD_COMMIT_COUNT)"

      - name: Upload macOS zipped .app artifact
        uses: actions/upload-artifact@v7
        with:
          name: KeiPix-macOS-${{ steps.version.outputs.version }}-build.${{ steps.version.outputs.build }}-app
          path: artifacts/KeiPix-${{ steps.version.outputs.version }}-build.${{ steps.version.outputs.build }}.zip
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload macOS DMG artifact
        if: steps.macos-format.outputs.format != 'zip'
        uses: actions/upload-artifact@v7
        with:
          name: KeiPix-macOS-${{ steps.version.outputs.version }}-build.${{ steps.version.outputs.build }}-dmg
          path: artifacts/KeiPix-${{ steps.version.outputs.version }}-build.${{ steps.version.outputs.build }}.dmg
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/KeiPix-*.zip
            artifacts/KeiPix-*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true

  package-ios:
    name: Package unsigned ${{ matrix.display-name }} IPA
    runs-on: macos-26
    timeout-minutes: 35

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ios
            display-name: iOS
          - platform: ipados
            display-name: iPadOS

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Select Xcode toolchain
        run: |
          set -euo pipefail
          xcode_path=""
          while IFS= read -r candidate; do
            xcode_path="$candidate"
          done < <(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V)
          if [ -z "$xcode_path" ]; then
            xcode_path="/Applications/Xcode.app"
          fi
          echo "Using $xcode_path"
          sudo xcode-select -s "$xcode_path/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: |
          set -euo pipefail
          if command -v xcodegen >/dev/null 2>&1; then
            xcodegen --version
          else
            brew install xcodegen
          fi

      - name: Cache Xcode build products
        uses: actions/cache@v5
        with:
          path: .tmp/DerivedData-unsigned-ipa-${{ matrix.platform }}
          key: xcode-unsigned-ipa-${{ runner.os }}-${{ runner.arch }}-${{ matrix.platform }}-${{ hashFiles('project.yml', 'Config/**/*.xcconfig', 'App/**/*.plist', 'App/**/*.entitlements', 'PrivacyInfo.xcprivacy', 'Sources/**/*.swift', 'Sources/KeiPix/Resources/**') }}
          restore-keys: |
            xcode-unsigned-ipa-${{ runner.os }}-${{ runner.arch }}-${{ matrix.platform }}-

      - name: Check version settings
        run: ./script/check_version_consistency.sh

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          source ./script/version_settings.sh
          keipix_load_version_settings "$PWD"
          echo "version=$KEIPIX_MARKETING_VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$KEIPIX_BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Version: $KEIPIX_MARKETING_VERSION ($KEIPIX_BUILD_NUMBER, source: $KEIPIX_BUILD_NUMBER_SOURCE, anchor: ${KEIPIX_BUILD_ANCHOR_TAG:-none}, commits: $KEIPIX_BUILD_COMMIT_COUNT)"

      - name: Build unsigned ${{ matrix.display-name }} IPA
        run: ./script/build_unsigned_ipa.sh "${{ matrix.platform }}"

      - name: Upload unsigned ${{ matrix.display-name }} IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: KeiPix-${{ matrix.display-name }}-${{ steps.version.outputs.version }}-build.${{ steps.version.outputs.build }}-unsigned-ipa
          path: artifacts/KeiPix-${{ matrix.display-name }}-${{ steps.version.outputs.version }}-build.${{ steps.version.outputs.build }}-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  publish-livecontainer-nightly:
    name: Publish LiveContainer nightly source
    runs-on: ubuntu-latest
    needs: [test, package-ios]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download unsigned IPA artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: KeiPix-*-unsigned-ipa
          path: artifacts
          merge-multiple: true

      - name: Generate LiveContainer source
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          source ./script/version_settings.sh
          keipix_load_version_settings "$PWD"
          version_date="$(git show -s --format=%cI HEAD)"
          commit="${GITHUB_SHA:0:12}"
          headline="$(git log -1 --pretty=%s)"
          KEIPIX_ARTIFACTS_DIR="$PWD/artifacts" \
          KEIPIX_VERSION_DATE="$version_date" \
          KEIPIX_COMMIT="$commit" \
          KEIPIX_HEADLINE="$headline" \
          KEIPIX_RUN_URL="$RUN_URL" \
            ./script/generate_livecontainer_apps_nightly.sh apps_nightly.json
          jq empty apps_nightly.json
          cat > artifacts/nightly-release-notes.md <<NOTES
          KeiPix nightly ${KEIPIX_VERSION_NAME} build ${KEIPIX_BUILD_NUMBER}

          Commit: ${GITHUB_SHA}
          Workflow: ${RUN_URL}

          LiveContainer source:
          https://github.com/hosizoraru/KeiPix/releases/download/nightly/apps_nightly.json
          NOTES

      - name: Upload LiveContainer source artifact
        uses: actions/upload-artifact@v7
        with:
          name: KeiPix-LiveContainer-apps-nightly
          path: apps_nightly.json
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Move nightly tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly "$GITHUB_SHA"
          git push origin refs/tags/nightly --force

      - name: Prune previous nightly release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view nightly >/dev/null 2>&1; then
            exit 0
          fi
          while IFS= read -r asset; do
            echo "Deleting previous nightly asset: $asset"
            gh release delete-asset nightly "$asset" --yes
          done < <(
            gh release view nightly --json assets --jq '.assets[].name' \
              | grep -E '^(apps_nightly\.json|KeiPix-(iOS|iPadOS)-.*-unsigned\.ipa)$' \
              || true
          )

      - name: Publish nightly release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: KeiPix Nightly
          body_path: artifacts/nightly-release-notes.md
          prerelease: true
          make_latest: false
          files: |
            apps_nightly.json
            artifacts/KeiPix-iOS-*-unsigned.ipa
            artifacts/KeiPix-iPadOS-*-unsigned.ipa
          fail_on_unmatched_files: true
