name: Build, Test & Package

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      include_dmg:
        description: "Also build a macOS DMG for manual runs"
        type: boolean
        default: false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"

permissions:
  contents: write
  actions: read

jobs:
  test:
    name: Build & test macOS
    runs-on: macos-26
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Select Xcode toolchain
        run: |
          set -euo pipefail
          xcode_path=""
          while IFS= read -r candidate; do
            xcode_path="$candidate"
          done < <(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V)
          if [ -z "$xcode_path" ]; then
            xcode_path="/Applications/Xcode.app"
          fi
          echo "Using $xcode_path"
          sudo xcode-select -s "$xcode_path/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM debug build products
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: spm-debug-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.resolved', 'Package.swift', 'Sources/**/*.swift', 'Sources/KeiPix/Resources/**') }}
          restore-keys: |
            spm-debug-${{ runner.os }}-${{ runner.arch }}-

      - name: Resolve build parallelism
        id: parallelism
        run: |
          set -euo pipefail
          source ./script/build_parallelism.sh
          jobs="$(keipix_resolve_build_jobs "${KEIPIX_BUILD_JOBS:-}")"
          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"
          echo "Using $jobs Swift build jobs"

      - name: Resolve dependencies
        run: swift package resolve

      - name: Check version settings
        run: ./script/check_version_consistency.sh

      - name: Build (macOS)
        run: swift build --jobs "${{ steps.parallelism.outputs.jobs }}"

      - name: Run tests
        run: swift test --parallel --jobs "${{ steps.parallelism.outputs.jobs }}"

  package-macos:
    name: Package macOS .app zip
    runs-on: macos-26
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Select Xcode toolchain
        run: |
          set -euo pipefail
          xcode_path=""
          while IFS= read -r candidate; do
            xcode_path="$candidate"
          done < <(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V)
          if [ -z "$xcode_path" ]; then
            xcode_path="/Applications/Xcode.app"
          fi
          echo "Using $xcode_path"
          sudo xcode-select -s "$xcode_path/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM release build products
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: spm-release-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.resolved', 'Package.swift', 'Sources/**/*.swift', 'Sources/KeiPix/Resources/**') }}
          restore-keys: |
            spm-release-${{ runner.os }}-${{ runner.arch }}-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Check version settings
        run: ./script/check_version_consistency.sh

      - name: Determine macOS package format
        id: macos-format
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          INCLUDE_DMG: ${{ github.event.inputs.include_dmg }}
        run: |
          set -euo pipefail
          if [ "${REF#refs/tags/v}" != "$REF" ] || { [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INCLUDE_DMG" = "true" ]; }; then
            fmt="both"
          else
            fmt="zip"
          fi
          echo "format=$fmt" >> "$GITHUB_OUTPUT"
          echo "macOS package format: $fmt"

      - name: Build release .app and package
        run: ./script/build_release_app.sh "${{ steps.macos-format.outputs.format }}"

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          source ./script/version_settings.sh
          keipix_load_version_settings "$PWD"
          echo "version=$KEIPIX_MARKETING_VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$KEIPIX_BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Version: $KEIPIX_MARKETING_VERSION ($KEIPIX_BUILD_NUMBER)"

      - name: Upload macOS zipped .app artifact
        uses: actions/upload-artifact@v7
        with:
          name: KeiPix-macOS-${{ steps.version.outputs.version }}-build.${{ steps.version.outputs.build }}-app
          path: artifacts/KeiPix-${{ steps.version.outputs.version }}-build.${{ steps.version.outputs.build }}.zip
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload macOS DMG artifact
        if: steps.macos-format.outputs.format != 'zip'
        uses: actions/upload-artifact@v7
        with:
          name: KeiPix-macOS-${{ steps.version.outputs.version }}-build.${{ steps.version.outputs.build }}-dmg
          path: artifacts/KeiPix-${{ steps.version.outputs.version }}-build.${{ steps.version.outputs.build }}.dmg
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/KeiPix-*.zip
            artifacts/KeiPix-*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true

  package-ios:
    name: Package unsigned ${{ matrix.display-name }} IPA
    runs-on: macos-26
    timeout-minutes: 35

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ios
            display-name: iOS
          - platform: ipados
            display-name: iPadOS

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Select Xcode toolchain
        run: |
          set -euo pipefail
          xcode_path=""
          while IFS= read -r candidate; do
            xcode_path="$candidate"
          done < <(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V)
          if [ -z "$xcode_path" ]; then
            xcode_path="/Applications/Xcode.app"
          fi
          echo "Using $xcode_path"
          sudo xcode-select -s "$xcode_path/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: |
          set -euo pipefail
          if command -v xcodegen >/dev/null 2>&1; then
            xcodegen --version
          else
            brew install xcodegen
          fi

      - name: Cache Xcode build products
        uses: actions/cache@v5
        with:
          path: .tmp/DerivedData-unsigned-ipa-${{ matrix.platform }}
          key: xcode-unsigned-ipa-${{ runner.os }}-${{ runner.arch }}-${{ matrix.platform }}-${{ hashFiles('project.yml', 'Config/**/*.xcconfig', 'App/**/*.plist', 'App/**/*.entitlements', 'PrivacyInfo.xcprivacy', 'Sources/**/*.swift', 'Sources/KeiPix/Resources/**') }}
          restore-keys: |
            xcode-unsigned-ipa-${{ runner.os }}-${{ runner.arch }}-${{ matrix.platform }}-

      - name: Check version settings
        run: ./script/check_version_consistency.sh

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          source ./script/version_settings.sh
          keipix_load_version_settings "$PWD"
          echo "version=$KEIPIX_MARKETING_VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$KEIPIX_BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Version: $KEIPIX_MARKETING_VERSION ($KEIPIX_BUILD_NUMBER)"

      - name: Build unsigned ${{ matrix.display-name }} IPA
        run: ./script/build_unsigned_ipa.sh "${{ matrix.platform }}"

      - name: Upload unsigned ${{ matrix.display-name }} IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: KeiPix-${{ matrix.display-name }}-${{ steps.version.outputs.version }}-build.${{ steps.version.outputs.build }}-unsigned-ipa
          path: artifacts/KeiPix-${{ matrix.display-name }}-${{ steps.version.outputs.version }}-build.${{ steps.version.outputs.build }}-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
