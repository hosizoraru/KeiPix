name: macOS Build

# Triggers:
# - push to master / a release branch -> regression check + zip artifact
# - pull request -> same, gated to the PR runner so we catch breakage
#   before it lands
# - tag push (v*) -> additionally produce a .dmg and attach both zip
#   and dmg to the GitHub Release (publishes only if the release
#   already exists, so the workflow never auto-publishes drafts)
# - manual dispatch -> on-demand build with selectable format
on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      format:
        description: "Artifact format"
        type: choice
        default: zip
        options: [zip, dmg, both]

# Cancel superseded runs on the same ref so the queue stays small.
concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed for tag-driven release uploads
  actions: read

jobs:
  build:
    name: Build & package KeiPix.app
    # macos-15 is the newest publicly available runner image as of
    # writing and ships with Xcode 16.x / Swift 6 toolchain that this
    # SwiftPM project targets. macos-latest is intentionally avoided
    # since GitHub rolls it forward unannounced.
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Tag descriptions feed CFBundleShortVersionString via
          # `git describe`, so we need annotated tag history. A
          # depth of 50 is enough for `describe` without the cost
          # of an unshallow fetch.
          fetch-depth: 50

      - name: Select Xcode toolchain
        # Pin to the newest stable Xcode the runner advertises. This
        # keeps Swift / SDK versions deterministic across runs even if
        # the runner image rolls a newer beta in.
        run: |
          set -euo pipefail
          xcode_path=""
          while IFS= read -r candidate; do
            xcode_path="$candidate"
          done < <(find /Applications -maxdepth 1 -type d -name 'Xcode_16*.app' | sort -V)
          if [ -z "$xcode_path" ]; then
            xcode_path="/Applications/Xcode.app"
          fi
          echo "Using $xcode_path"
          sudo xcode-select -s "$xcode_path/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM build products
        # The SwiftPM build folder is the dominant compile-time cost.
        # Keying on Package.resolved + every .swift source means any
        # real change still rebuilds; a same-content rerun reuses the
        # incremental build.
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.resolved', 'Package.swift', 'Sources/**/*.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run tests
        # Tests run against the debug build and exercise the same
        # source set as the release packaging step below. They're
        # ~2 seconds locally, so paying for a green signal in CI is
        # cheap insurance against shipping a broken bundle.
        run: swift test --parallel

      - name: Determine artifact format
        id: format
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          DISPATCH_FORMAT: ${{ github.event.inputs.format }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            fmt="$DISPATCH_FORMAT"
          elif [ "${REF#refs/tags/v}" != "$REF" ]; then
            # Tag pushes always produce both formats so we have
            # something to attach to the release.
            fmt="both"
          else
            # Push / PR runs only need the zip; dmg adds ~30s and
            # nobody downloads it from a regression run.
            fmt="zip"
          fi
          echo "format=$fmt" >> "$GITHUB_OUTPUT"
          echo "Artifact format: $fmt"

      - name: Build release .app and package
        run: ./script/build_release_app.sh "${{ steps.format.outputs.format }}"

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          version="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeiPix-${{ steps.version.outputs.version }}
          path: |
            artifacts/KeiPix-*.zip
            artifacts/KeiPix-*.dmg
          if-no-files-found: error
          # Keep PR/feature branch artifacts trim. Tag releases are
          # uploaded separately and live forever on the Release page.
          retention-days: 14
          compression-level: 0   # the zip / dmg are already compressed

      - name: Attach to GitHub Release
        # Only fire on tag pushes. We use softprops/action-gh-release
        # because it tolerates pre-existing draft releases (so a
        # release-please workflow can own metadata) and uploads our
        # binaries idempotently.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/KeiPix-*.zip
            artifacts/KeiPix-*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
