name: Build & Test

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      format:
        description: "Artifact format"
        type: choice
        default: zip
        options: [zip, dmg, both]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build & package KeiPix.app
    runs-on: macos-26
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: Select Xcode toolchain
        run: |
          set -euo pipefail
          xcode_path=""
          while IFS= read -r candidate; do
            xcode_path="$candidate"
          done < <(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V)
          if [ -z "$xcode_path" ]; then
            xcode_path="/Applications/Xcode.app"
          fi
          echo "Using $xcode_path"
          sudo xcode-select -s "$xcode_path/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM build products
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.resolved', 'Package.swift', 'Sources/**/*.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (macOS)
        run: swift build

      - name: Run tests
        run: swift test --parallel

      - name: Determine artifact format
        id: format
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          DISPATCH_FORMAT: ${{ github.event.inputs.format }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            fmt="$DISPATCH_FORMAT"
          elif [ "${REF#refs/tags/v}" != "$REF" ]; then
            fmt="both"
          else
            fmt="zip"
          fi
          echo "format=$fmt" >> "$GITHUB_OUTPUT"
          echo "Artifact format: $fmt"

      - name: Build release .app and package
        run: ./script/build_release_app.sh "${{ steps.format.outputs.format }}"

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          version="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: KeiPix-${{ steps.version.outputs.version }}
          path: |
            artifacts/KeiPix-*.zip
            artifacts/KeiPix-*.dmg
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/KeiPix-*.zip
            artifacts/KeiPix-*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
